<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuis Matematika</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(135deg,#74ebd5,#ACB6E5);
}
.container{
  max-width:95%;
  margin:15px auto;
  background:#fff;
  padding:16px;
  border-radius:18px;
  text-align:center;
}
.timer{
  font-size:22px;
  font-weight:bold;
  color:#d9534f;
}
.question{
  text-align:left;
  font-size:22px;
  white-space:pre-line;
  margin-top:10px;
}

/* FRAME SOAL */
.question-frame{
  background:#f8fbff;
  border:3px solid #2196f3;
  border-radius:18px;
  padding:18px;
  margin-top:15px;
  box-shadow:0 6px 16px rgba(0,0,0,.1);
}
.question-frame::before{
  content:"📌 Soal";
  display:inline-block;
  background:#2196f3;
  color:#fff;
  padding:4px 14px;
  border-radius:20px;
  font-size:14px;
  font-weight:bold;
  margin-bottom:10px;
}

.question-img,
.focus-img{
  max-width:300px;
  border-radius:12px;
  margin:12px auto;
  display:none;
}

.options,.focusOptions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:16px;
}
.optionBtn{
  padding:14px;
  font-size:18px;
  border:none;
  border-radius:12px;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}
.btnA{background:#1e88e5}
.btnB{background:#43a047}
.btnC{background:#fb8c00}
.btnD{background:#8e24aa}
.correct{background:#2ecc71!important}
.wrong{background:#e74c3c!important}

button{
  margin:6px;
  padding:10px 16px;
  border:none;
  border-radius:12px;
  background:#4caf50;
  color:#fff;
  cursor:pointer;
}

#focusLayer{
  display:none;
  position:fixed;
  inset:0;
  background:#fff;
  z-index:9999;
  padding:16px;
}
.focusBox{max-width:800px;margin:auto}
.focusOption{
  padding:12px;
  border-radius:10px;
  color:#fff;
  font-weight:bold;
}
.focusP{
  background:#f9fbff;
  border-left:5px solid #2196f3;
  padding:15px;
  border-radius:10px;
  margin-top:12px;
}

@media(max-width:768px){
  .options,.focusOptions{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div id="quiz" class="container">
  <h1>🎮 Kuis Matematika</h1>

  <div id="timer" class="timer"></div>
  <div id="questionNumber"></div>

  <div class="question-frame">
    <div id="question" class="question"></div>
    <img id="questionImg" class="question-img">
  </div>

  <div id="options" class="options"></div>

  <button onclick="prevQuestion()">◀ Sebelumnya</button>
  <button onclick="nextQuestion()">▶ Berikutnya</button>
  <button onclick="showFocus()">📘 Pembahasan</button>

  <div id="feedback"></div>
</div>

<!-- PEMBAHASAN -->
<div id="focusLayer">
  <div class="focusBox">
    <div class="question-frame">
      <div id="focusQuestion" class="question"></div>
      <img id="focusImg" class="focus-img">
    </div>
    <div id="focusOptions" class="focusOptions"></div>
    <div id="focusPembahasan" class="focusP"></div>
    <button onclick="closeFocus()">⬅ Kembali</button>
  </div>
</div>

<script>
let questions=[
{
q:"Biaya parkir di sebuah tempat adalah Rp5.000 untuk jam pertama dan Rp2.000 untuk setiap jam berikutnya. Berapa biaya parkir untuk 6 jam?",
options:["Rp15.000","Rp17.000","Rp18.000","Rp20.000"],
correct:"Rp15.000",
p:"Biaya parkir terdiri dari Rp5.000 untuk jam pertama dan Rp2.000 untuk setiap jam berikutnya. Untuk 6 jam berarti ada 5 jam tambahan. Biaya = 5.000 + 2.000 × 5 = 5.000 + 10.000 = Rp15.000.",
img:""
},
{
q:"Seorang siswa menabung Rp10.000 setiap minggu. Tabungan awalnya Rp50.000. Berapa jumlah tabungan setelah 12 minggu?",
options:["Rp160.000","Rp170.000","Rp180.000","Rp190.000"],
correct:"Rp170.000",
p:"Tabungan bertambah secara linear. Total tabungan = tabungan awal + 12 × 10.000 = 50.000 + 120.000 = Rp170.000.",
img:""
},
{
q:"Seorang pengrajin menjual kerajinan tangan seharga Rp25.000 per buah. Biaya tetap produksi adalah Rp100.000. Berapa pendapatan jika menjual 10 barang?",
options:["Rp250.000","Rp300.000","Rp350.000","Rp400.000"],
correct:"Rp250.000",
p:"Pendapatan (revenue) dihitung dari harga jual dikalikan jumlah barang. Pendapatan = 25.000 × 10 = Rp250.000. Biaya tetap tidak dikurangkan atau ditambahkan ke pendapatan, melainkan digunakan untuk menghitung keuntungan. Oleh karena itu kunci jawaban pada soal diperbaiki.",
img:""
},
{
q:"Biaya naik taksi terdiri dari biaya awal Rp7.000 dan tambahan Rp4.000 per kilometer. Jika seseorang membayar Rp27.000, berapa kilometer yang telah ditempuh?",
options:["4 km","5 km","6 km","7 km"],
correct:"5 km",
p:"Modelkan dengan persamaan 27.000 = 7.000 + 4.000x. Maka 20.000 = 4.000x sehingga x = 5. Jadi jarak yang ditempuh adalah 5 km. Kunci jawaban diperbaiki sesuai hasil perhitungan.",
img:""
},
{
q:"Seorang siswa memiliki pulsa awal Rp20.000 dan menggunakan Rp1.500 per hari. Setelah berapa hari pulsanya habis?",
options:["10 hari","12 hari","13 hari","14 hari"],
correct:"14 hari",
p:"Pulsa digunakan sebesar Rp1.500 per hari. Banyak hari hingga pulsa habis adalah 20.000 ÷ 1.500 ≈ 13,33 hari. Artinya pulsa akan habis pada hari ke-14. Oleh karena itu jawaban yang paling tepat adalah 14 hari.",
img:""
}

];

let currentQuestion=0;
let answered=new Array(questions.length).fill(false);
let benar=0;
let quizSelesai=false;

/* TIMER */
let t=3600;
let timerInterval=setInterval(()=>{
  if(quizSelesai)return;
  let m=Math.floor(t/60),s=t%60;
  if(s<10)s="0"+s;
  timer.textContent=`Waktu: ${m}:${s}`;
  t--;
},1000);

/* TAMPIL SOAL (✅ SAMA DENGAN CONTOH REGU) */
function showQuestion(){
  let q=questions[currentQuestion];
  questionNumber.textContent=`Soal ${currentQuestion+1}`;
  question.textContent=q.q;

  if(q.img){
    questionImg.src=q.img;
    questionImg.style.display="block";
  }else questionImg.style.display="none";

  options.innerHTML=q.options.map((o,i)=>`
    <button class="optionBtn btn${String.fromCharCode(65+i)}"
      onclick="checkAnswer('${o}',this)"
      ${answered[currentQuestion]||quizSelesai?"disabled":""}>
      ${String.fromCharCode(65+i)}. ${o}
    </button>`).join("");

  /* ✅ INI KUNCINYA */
  feedback.textContent = answered[currentQuestion] ? "✔ Sudah terjawab" : "";
}

/* JAWAB */
function checkAnswer(ans,btn){
  if(answered[currentQuestion]||quizSelesai)return;
  answered[currentQuestion]=true;

  if(ans===questions[currentQuestion].correct){
    btn.classList.add("correct");
    benar++;
    feedback.textContent="✅ Benar";
  }else{
    btn.classList.add("wrong");
    feedback.textContent="❌ Salah";
  }

  if(answered.every(v=>v)){
    quizSelesai=true;
    clearInterval(timerInterval);
    let nilai=Math.round((benar/questions.length)*100);
    timer.textContent=`✅ Selesai | Nilai: ${nilai}`;
  }
}

/* NAV */
function nextQuestion(){currentQuestion=(currentQuestion+1)%questions.length;showQuestion();}
function prevQuestion(){currentQuestion=(currentQuestion-1+questions.length)%questions.length;showQuestion();}

/* PEMBAHASAN */
function showFocus(){
  let q=questions[currentQuestion];
  quiz.style.display="none";
  focusLayer.style.display="block";
  focusQuestion.textContent=q.q;

  if(q.img){
    focusImg.src=q.img;
    focusImg.style.display="block";
  }else focusImg.style.display="none";

  focusOptions.innerHTML=q.options.map((o,i)=>`
    <div class="focusOption btn${String.fromCharCode(65+i)}"
      style="background:${o===q.correct?'#2ecc71':'#bbb'}">
      ${String.fromCharCode(65+i)}. ${o}
    </div>`).join("");

  focusPembahasan.textContent=q.p;
}
function closeFocus(){
  focusLayer.style.display="none";
  quiz.style.display="block";
}

/* INIT */
showQuestion();
</script>

</body>
</html>
