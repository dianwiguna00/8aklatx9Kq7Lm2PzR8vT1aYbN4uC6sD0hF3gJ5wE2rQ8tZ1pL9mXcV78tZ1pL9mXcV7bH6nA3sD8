<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuis Matematika</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(135deg,#74ebd5,#ACB6E5);
}
.container{
  max-width:95%;
  margin:15px auto;
  background:#fff;
  padding:16px;
  border-radius:18px;
  text-align:center;
}
.timer{
  font-size:22px;
  font-weight:bold;
  color:#d9534f;
}
.question{
  text-align:left;
  font-size:22px;
  white-space:pre-line;
  margin-top:10px;
}

/* FRAME SOAL */
.question-frame{
  background:#f8fbff;
  border:3px solid #2196f3;
  border-radius:18px;
  padding:18px;
  margin-top:15px;
  box-shadow:0 6px 16px rgba(0,0,0,.1);
}
.question-frame::before{
  content:"📌 Soal";
  display:inline-block;
  background:#2196f3;
  color:#fff;
  padding:4px 14px;
  border-radius:20px;
  font-size:14px;
  font-weight:bold;
  margin-bottom:10px;
}

.question-img,
.focus-img{
  max-width:300px;
  border-radius:12px;
  margin:12px auto;
  display:none;
}

.options,.focusOptions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:16px;
}
.optionBtn{
  padding:14px;
  font-size:18px;
  border:none;
  border-radius:12px;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}
.btnA{background:#1e88e5}
.btnB{background:#43a047}
.btnC{background:#fb8c00}
.btnD{background:#8e24aa}
.correct{background:#2ecc71!important}
.wrong{background:#e74c3c!important}

button{
  margin:6px;
  padding:10px 16px;
  border:none;
  border-radius:12px;
  background:#4caf50;
  color:#fff;
  cursor:pointer;
}

#focusLayer{
  display:none;
  position:fixed;
  inset:0;
  background:#fff;
  z-index:9999;
  padding:16px;
}
.focusBox{max-width:800px;margin:auto}
.focusOption{
  padding:12px;
  border-radius:10px;
  color:#fff;
  font-weight:bold;
}
.focusP{
  background:#f9fbff;
  border-left:5px solid #2196f3;
  padding:15px;
  border-radius:10px;
  margin-top:12px;
}

@media(max-width:768px){
  .options,.focusOptions{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div id="quiz" class="container">
  <h1>🎮 Kuis Matematika</h1>

  <div id="timer" class="timer"></div>
  <div id="questionNumber"></div>

  <div class="question-frame">
    <div id="question" class="question"></div>
    <img id="questionImg" class="question-img">
  </div>

  <div id="options" class="options"></div>

  <button onclick="prevQuestion()">◀ Sebelumnya</button>
  <button onclick="nextQuestion()">▶ Berikutnya</button>
  <button onclick="showFocus()">📘 Pembahasan</button>

  <div id="feedback"></div>
</div>

<!-- PEMBAHASAN -->
<div id="focusLayer">
  <div class="focusBox">
    <div class="question-frame">
      <div id="focusQuestion" class="question"></div>
      <img id="focusImg" class="focus-img">
    </div>
    <div id="focusOptions" class="focusOptions"></div>
    <div id="focusPembahasan" class="focusP"></div>
    <button onclick="closeFocus()">⬅ Kembali</button>
  </div>
</div>

<script>
let questions=[
{
q:"Seorang siswa membeli 2 buku tulis dan 3 pensil seharga Rp21.000. Temannya membeli 4 buku tulis dan 1 pensil seharga Rp25.000. Berapakah harga sebuah buku tulis dan sebuah pensil?",
options:["Buku tulis Rp4.000, Pensil Rp3.000","Buku tulis Rp5.400, Pensil Rp3.400","Buku tulis Rp6.000, Pensil Rp2.000","Buku tulis Rp5.000, Pensil Rp2.000"],
correct:"Buku tulis Rp5.400, Pensil Rp3.400",
p:"Misalkan x harga buku tulis dan y harga pensil. Diperoleh SPLDV: 2x + 3y = 21.000 dan 4x + y = 25.000. Dari persamaan kedua, y = 25.000 − 4x. Substitusi ke persamaan pertama menghasilkan 2x + 3(25.000 − 4x) = 21.000 sehingga diperoleh x = 5.400 dan y = 3.400.",
img:""
},
{
q:"Seorang ibu membeli 3 kg apel dan 2 kg jeruk seharga Rp60.000. Temannya membeli 2 kg apel dan 4 kg jeruk seharga Rp70.000. Berapakah harga per kg apel dan jeruk?",
options:["Apel Rp10.000, Jeruk Rp15.000","Apel Rp15.000, Jeruk Rp10.000","Apel Rp12.500, Jeruk Rp11.250","Apel Rp14.000, Jeruk Rp12.000"],
correct:"Apel Rp12.500, Jeruk Rp11.250",
p:"Misalkan x harga apel per kg dan y harga jeruk per kg. Diperoleh SPLDV: 3x + 2y = 60.000 dan 2x + 4y = 70.000. Dengan eliminasi diperoleh x = 12.500 dan y = 11.250.",
img:""
},
{
q:"Seorang siswa membeli 5 buku dan 2 penggaris seharga Rp40.000. Temannya membeli 3 buku dan 4 penggaris seharga Rp38.000. Berapakah harga sebuah buku dan sebuah penggaris?",
options:["Buku Rp6.000, Penggaris Rp5.000","Buku Rp7.000, Penggaris Rp4.000","Buku Rp8.000, Penggaris Rp3.000","Buku Rp5.000, Penggaris Rp6.000"],
correct:"Buku Rp6.000, Penggaris Rp5.000",
p:"Misalkan x harga buku dan y harga penggaris. Diperoleh SPLDV: 5x + 2y = 40.000 dan 3x + 4y = 38.000. Eliminasi menghasilkan x = 6.000 dan y = 5.000. Jadi jawaban yang benar adalah Buku Rp6.000 dan Penggaris Rp5.000.",
img:""
},
{
q:"Seorang pedagang menjual 2 kg gula dan 3 liter minyak seharga Rp49.000. Temannya membeli 4 kg gula dan 1 liter minyak seharga Rp47.000. Berapakah harga per kg gula dan per liter minyak?",
options:["Gula Rp10.000, Minyak Rp9.000","Gula Rp11.000, Minyak Rp7.000","Gula Rp12.000, Minyak Rp5.000","Gula Rp9.200, Minyak Rp10.200"],
correct:"Gula Rp9.200, Minyak Rp10.200",
p:"Misalkan x harga gula per kg dan y harga minyak per liter. Diperoleh SPLDV: 2x + 3y = 49.000 dan 4x + y = 47.000. Dengan eliminasi diperoleh x = 9.200 dan y = 10.200.",
img:""
},
{
q:"Seorang siswa membeli 3 buku dan 2 pensil seharga Rp27.000. Temannya membeli 2 buku dan 4 pensil seharga Rp28.000. Berapakah harga sebuah buku dan sebuah pensil?",
options:["Buku Rp6.500, Pensil Rp3.750","Buku Rp7.000, Pensil Rp3.000","Buku Rp8.000, Pensil Rp2.000","Buku Rp5.000, Pensil Rp5.000"],
correct:"Buku Rp6.500, Pensil Rp3.750",
p:"Misalkan x harga buku dan y harga pensil. Diperoleh SPLDV: 3x + 2y = 27.000 dan 2x + 4y = 28.000. Eliminasi menghasilkan x = 6.500 dan y = 3.750.",
img:""
}

];

let currentQuestion=0;
let answered=new Array(questions.length).fill(false);
let benar=0;
let quizSelesai=false;

/* TIMER */
let t=3600;
let timerInterval=setInterval(()=>{
  if(quizSelesai)return;
  let m=Math.floor(t/60),s=t%60;
  if(s<10)s="0"+s;
  timer.textContent=`Waktu: ${m}:${s}`;
  t--;
},1000);

/* TAMPIL SOAL (✅ SAMA DENGAN CONTOH REGU) */
function showQuestion(){
  let q=questions[currentQuestion];
  questionNumber.textContent=`Soal ${currentQuestion+1}`;
  question.textContent=q.q;

  if(q.img){
    questionImg.src=q.img;
    questionImg.style.display="block";
  }else questionImg.style.display="none";

  options.innerHTML=q.options.map((o,i)=>`
    <button class="optionBtn btn${String.fromCharCode(65+i)}"
      onclick="checkAnswer('${o}',this)"
      ${answered[currentQuestion]||quizSelesai?"disabled":""}>
      ${String.fromCharCode(65+i)}. ${o}
    </button>`).join("");

  /* ✅ INI KUNCINYA */
  feedback.textContent = answered[currentQuestion] ? "✔ Sudah terjawab" : "";
}

/* JAWAB */
function checkAnswer(ans,btn){
  if(answered[currentQuestion]||quizSelesai)return;
  answered[currentQuestion]=true;

  if(ans===questions[currentQuestion].correct){
    btn.classList.add("correct");
    benar++;
    feedback.textContent="✅ Benar";
  }else{
    btn.classList.add("wrong");
    feedback.textContent="❌ Salah";
  }

  if(answered.every(v=>v)){
    quizSelesai=true;
    clearInterval(timerInterval);
    let nilai=Math.round((benar/questions.length)*100);
    timer.textContent=`✅ Selesai | Nilai: ${nilai}`;
  }
}

/* NAV */
function nextQuestion(){currentQuestion=(currentQuestion+1)%questions.length;showQuestion();}
function prevQuestion(){currentQuestion=(currentQuestion-1+questions.length)%questions.length;showQuestion();}

/* PEMBAHASAN */
function showFocus(){
  let q=questions[currentQuestion];
  quiz.style.display="none";
  focusLayer.style.display="block";
  focusQuestion.textContent=q.q;

  if(q.img){
    focusImg.src=q.img;
    focusImg.style.display="block";
  }else focusImg.style.display="none";

  focusOptions.innerHTML=q.options.map((o,i)=>`
    <div class="focusOption btn${String.fromCharCode(65+i)}"
      style="background:${o===q.correct?'#2ecc71':'#bbb'}">
      ${String.fromCharCode(65+i)}. ${o}
    </div>`).join("");

  focusPembahasan.textContent=q.p;
}
function closeFocus(){
  focusLayer.style.display="none";
  quiz.style.display="block";
}

/* INIT */
showQuestion();
</script>

</body>
</html>
