<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuis Matematika</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(135deg,#74ebd5,#ACB6E5);
}
.container{
  max-width:95%;
  margin:15px auto;
  background:#fff;
  padding:16px;
  border-radius:18px;
  text-align:center;
}
.timer{
  font-size:22px;
  font-weight:bold;
  color:#d9534f;
}
.question{
  text-align:left;
  font-size:22px;
  white-space:pre-line;
  margin-top:10px;
}

/* FRAME SOAL */
.question-frame{
  background:#f8fbff;
  border:3px solid #2196f3;
  border-radius:18px;
  padding:18px;
  margin-top:15px;
  box-shadow:0 6px 16px rgba(0,0,0,.1);
}
.question-frame::before{
  content:"📌 Soal";
  display:inline-block;
  background:#2196f3;
  color:#fff;
  padding:4px 14px;
  border-radius:20px;
  font-size:14px;
  font-weight:bold;
  margin-bottom:10px;
}

.question-img,
.focus-img{
  max-width:300px;
  border-radius:12px;
  margin:12px auto;
  display:none;
}

.options,.focusOptions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:16px;
}
.optionBtn{
  padding:14px;
  font-size:18px;
  border:none;
  border-radius:12px;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}
.btnA{background:#1e88e5}
.btnB{background:#43a047}
.btnC{background:#fb8c00}
.btnD{background:#8e24aa}
.correct{background:#2ecc71!important}
.wrong{background:#e74c3c!important}

button{
  margin:6px;
  padding:10px 16px;
  border:none;
  border-radius:12px;
  background:#4caf50;
  color:#fff;
  cursor:pointer;
}

#focusLayer{
  display:none;
  position:fixed;
  inset:0;
  background:#fff;
  z-index:9999;
  padding:16px;
}
.focusBox{max-width:800px;margin:auto}
.focusOption{
  padding:12px;
  border-radius:10px;
  color:#fff;
  font-weight:bold;
}
.focusP{
  background:#f9fbff;
  border-left:5px solid #2196f3;
  padding:15px;
  border-radius:10px;
  margin-top:12px;
}

@media(max-width:768px){
  .options,.focusOptions{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div id="quiz" class="container">
  <h1>🎮 Kuis Matematika</h1>

  <div id="timer" class="timer"></div>
  <div id="questionNumber"></div>

  <div class="question-frame">
    <div id="question" class="question"></div>
    <img id="questionImg" class="question-img">
  </div>

  <div id="options" class="options"></div>

  <button onclick="prevQuestion()">◀ Sebelumnya</button>
  <button onclick="nextQuestion()">▶ Berikutnya</button>
  <button onclick="showFocus()">📘 Pembahasan</button>

  <div id="feedback"></div>
</div>

<!-- PEMBAHASAN -->
<div id="focusLayer">
  <div class="focusBox">
    <div class="question-frame">
      <div id="focusQuestion" class="question"></div>
      <img id="focusImg" class="focus-img">
    </div>
    <div id="focusOptions" class="focusOptions"></div>
    <div id="focusPembahasan" class="focusP"></div>
    <button onclick="closeFocus()">⬅ Kembali</button>
  </div>
</div>

<script>
let questions=[
{
q:"Seorang pedagang membeli 3 kg apel dan 2 kg jeruk seharga Rp28.000. Pada hari berikutnya, ia membeli 2 kg apel dan 4 kg jeruk seharga Rp32.000. Jika x adalah harga 1 kg apel dan y adalah harga 1 kg jeruk, SPLDV yang sesuai adalah ...",
options:["3x + 2y = 28000 dan 2x + 4y = 32000","3x + 2y = 32000 dan 2x + 4y = 28000","2x + 3y = 28000 dan 4x + 2y = 32000","2x + 3y = 32000 dan 4x + 2y = 28000"],
correct:"3x + 2y = 28000 dan 2x + 4y = 32000",
p:"Masalah menyatakan langsung jumlah kilogram apel dan jeruk beserta total harganya. Pembelian pertama menghasilkan persamaan 3x + 2y = 28000. Pembelian kedua menghasilkan persamaan 2x + 4y = 32000. Kedua persamaan ini membentuk SPLDV yang sesuai.",
img:""
},
{
q:"Dalam sebuah lomba, jumlah skor dua peserta adalah 150. Skor peserta A dua kali skor peserta B. Jika x adalah skor peserta A dan y adalah skor peserta B, SPLDV yang sesuai adalah ...",
options:["x + y = 150 dan x = 2y","x + y = 150 dan y = 2x","x - y = 150 dan x = 2y","x + y = 2x dan x = 150"],
correct:"x + y = 150 dan x = 2y",
p:"Jumlah skor kedua peserta dinyatakan dengan x + y = 150. Informasi bahwa skor peserta A dua kali skor peserta B diterjemahkan menjadi x = 2y. Kedua persamaan tersebut membentuk SPLDV yang benar.",
img:""
},
{
q:"Seorang siswa membeli 4 pensil dan 3 buku seharga Rp31.000. Temannya membeli 2 pensil dan 5 buku seharga Rp39.000. Jika x adalah harga pensil dan y adalah harga buku, SPLDV yang sesuai adalah ...",
options:["4x + 3y = 31000 dan 2x + 5y = 39000","4x + 3y = 39000 dan 2x + 5y = 31000","3x + 4y = 31000 dan 5x + 2y = 39000","3x + 4y = 39000 dan 5x + 2y = 31000"],
correct:"4x + 3y = 31000 dan 2x + 5y = 39000",
p:"Pembelian pertama menghasilkan persamaan 4x + 3y = 31000 karena terdiri dari 4 pensil dan 3 buku. Pembelian kedua terdiri dari 2 pensil dan 5 buku sehingga diperoleh persamaan 2x + 5y = 39000. Keduanya membentuk SPLDV.",
img:""
},
{
q:"Dalam suatu kelas, jumlah siswa laki-laki dan perempuan adalah 36 orang. Jika jumlah siswa laki-laki 4 lebih banyak dari siswa perempuan, SPLDV yang sesuai adalah ...",
options:["x + y = 36 dan x = y + 4","x + y = 36 dan x = y - 4","x + y = 36 dan y = x + 4","x + y = 36 dan y = x - 4"],
correct:"x + y = 36 dan x = y + 4",
p:"Jumlah seluruh siswa dinyatakan dengan x + y = 36. Kalimat 'jumlah siswa laki-laki 4 lebih banyak dari siswa perempuan' berarti x = y + 4. Kedua persamaan ini membentuk SPLDV yang tepat.",
img:""
},
{
q:"Seorang penjual menjual 5 roti dan 2 kue seharga Rp22.000. Pada hari lain, ia menjual 3 roti dan 4 kue seharga Rp20.000. Jika x adalah harga roti dan y adalah harga kue, SPLDV yang sesuai adalah ...",
options:["5x + 2y = 22000 dan 3x + 4y = 20000","5x + 2y = 20000 dan 3x + 4y = 22000","2x + 5y = 22000 dan 4x + 3y = 20000","2x + 5y = 20000 dan 4x + 3y = 22000"],
correct:"5x + 2y = 22000 dan 3x + 4y = 20000",
p:"Penjualan pertama berupa 5 roti dan 2 kue dengan total Rp22.000 sehingga diperoleh persamaan 5x + 2y = 22000. Penjualan kedua berupa 3 roti dan 4 kue dengan total Rp20.000 sehingga diperoleh persamaan 3x + 4y = 20000. Keduanya membentuk SPLDV yang sesuai.",
img:""
}

];

let currentQuestion=0;
let answered=new Array(questions.length).fill(false);
let benar=0;
let quizSelesai=false;

/* TIMER */
let t=3600;
let timerInterval=setInterval(()=>{
  if(quizSelesai)return;
  let m=Math.floor(t/60),s=t%60;
  if(s<10)s="0"+s;
  timer.textContent=`Waktu: ${m}:${s}`;
  t--;
},1000);

/* TAMPIL SOAL (✅ SAMA DENGAN CONTOH REGU) */
function showQuestion(){
  let q=questions[currentQuestion];
  questionNumber.textContent=`Soal ${currentQuestion+1}`;
  question.textContent=q.q;

  if(q.img){
    questionImg.src=q.img;
    questionImg.style.display="block";
  }else questionImg.style.display="none";

  options.innerHTML=q.options.map((o,i)=>`
    <button class="optionBtn btn${String.fromCharCode(65+i)}"
      onclick="checkAnswer('${o}',this)"
      ${answered[currentQuestion]||quizSelesai?"disabled":""}>
      ${String.fromCharCode(65+i)}. ${o}
    </button>`).join("");

  /* ✅ INI KUNCINYA */
  feedback.textContent = answered[currentQuestion] ? "✔ Sudah terjawab" : "";
}

/* JAWAB */
function checkAnswer(ans,btn){
  if(answered[currentQuestion]||quizSelesai)return;
  answered[currentQuestion]=true;

  if(ans===questions[currentQuestion].correct){
    btn.classList.add("correct");
    benar++;
    feedback.textContent="✅ Benar";
  }else{
    btn.classList.add("wrong");
    feedback.textContent="❌ Salah";
  }

  if(answered.every(v=>v)){
    quizSelesai=true;
    clearInterval(timerInterval);
    let nilai=Math.round((benar/questions.length)*100);
    timer.textContent=`✅ Selesai | Nilai: ${nilai}`;
  }
}

/* NAV */
function nextQuestion(){currentQuestion=(currentQuestion+1)%questions.length;showQuestion();}
function prevQuestion(){currentQuestion=(currentQuestion-1+questions.length)%questions.length;showQuestion();}

/* PEMBAHASAN */
function showFocus(){
  let q=questions[currentQuestion];
  quiz.style.display="none";
  focusLayer.style.display="block";
  focusQuestion.textContent=q.q;

  if(q.img){
    focusImg.src=q.img;
    focusImg.style.display="block";
  }else focusImg.style.display="none";

  focusOptions.innerHTML=q.options.map((o,i)=>`
    <div class="focusOption btn${String.fromCharCode(65+i)}"
      style="background:${o===q.correct?'#2ecc71':'#bbb'}">
      ${String.fromCharCode(65+i)}. ${o}
    </div>`).join("");

  focusPembahasan.textContent=q.p;
}
function closeFocus(){
  focusLayer.style.display="none";
  quiz.style.display="block";
}

/* INIT */
showQuestion();
</script>

</body>
</html>
