<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuis Matematika</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(135deg,#74ebd5,#ACB6E5);
}
.container{
  max-width:95%;
  margin:15px auto;
  background:#fff;
  padding:16px;
  border-radius:18px;
  text-align:center;
}
.timer{
  font-size:22px;
  font-weight:bold;
  color:#d9534f;
}
.question{
  text-align:left;
  font-size:22px;
  white-space:pre-line;
  margin-top:10px;
}

/* FRAME SOAL */
.question-frame{
  background:#f8fbff;
  border:3px solid #2196f3;
  border-radius:18px;
  padding:18px;
  margin-top:15px;
  box-shadow:0 6px 16px rgba(0,0,0,.1);
}
.question-frame::before{
  content:"📌 Soal";
  display:inline-block;
  background:#2196f3;
  color:#fff;
  padding:4px 14px;
  border-radius:20px;
  font-size:14px;
  font-weight:bold;
  margin-bottom:10px;
}

.question-img,
.focus-img{
  max-width:300px;
  border-radius:12px;
  margin:12px auto;
  display:none;
}

.options,.focusOptions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:16px;
}
.optionBtn{
  padding:14px;
  font-size:18px;
  border:none;
  border-radius:12px;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}
.btnA{background:#1e88e5}
.btnB{background:#43a047}
.btnC{background:#fb8c00}
.btnD{background:#8e24aa}
.correct{background:#2ecc71!important}
.wrong{background:#e74c3c!important}

button{
  margin:6px;
  padding:10px 16px;
  border:none;
  border-radius:12px;
  background:#4caf50;
  color:#fff;
  cursor:pointer;
}

#focusLayer{
  display:none;
  position:fixed;
  inset:0;
  background:#fff;
  z-index:9999;
  padding:16px;
}
.focusBox{max-width:800px;margin:auto}
.focusOption{
  padding:12px;
  border-radius:10px;
  color:#fff;
  font-weight:bold;
}
.focusP{
  background:#f9fbff;
  border-left:5px solid #2196f3;
  padding:15px;
  border-radius:10px;
  margin-top:12px;
}

@media(max-width:768px){
  .options,.focusOptions{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div id="quiz" class="container">
  <h1>🎮 Kuis Matematika</h1>

  <div id="timer" class="timer"></div>
  <div id="questionNumber"></div>

  <div class="question-frame">
    <div id="question" class="question"></div>
    <img id="questionImg" class="question-img">
  </div>

  <div id="options" class="options"></div>

  <button onclick="prevQuestion()">◀ Sebelumnya</button>
  <button onclick="nextQuestion()">▶ Berikutnya</button>
  <button onclick="showFocus()">📘 Pembahasan</button>

  <div id="feedback"></div>
</div>

<!-- PEMBAHASAN -->
<div id="focusLayer">
  <div class="focusBox">
    <div class="question-frame">
      <div id="focusQuestion" class="question"></div>
      <img id="focusImg" class="focus-img">
    </div>
    <div id="focusOptions" class="focusOptions"></div>
    <div id="focusPembahasan" class="focusP"></div>
    <button onclick="closeFocus()">⬅ Kembali</button>
  </div>
</div>

<script>
let questions=[
{
q:"Sebuah taman memiliki barisan pohon yang ditanam setiap tahun. Tahun pertama: 7 pohon, tahun kedua: 11 pohon, tahun ketiga: 15 pohon, dan seterusnya. Berapa jumlah pohon yang ditanam pada tahun ke-8?",
options:["31","35","39","43"],
correct:"35",
p:"Jumlah pohon membentuk pola aritmetika dengan suku pertama a = 7 dan beda d = 4. Rumus suku ke-n adalah Un = a + (n - 1)d. Untuk tahun ke-8: U8 = 7 + (8 - 1)×4 = 7 + 28 = 35. Kunci jawaban yang benar adalah 35.",
img:""
},
{
q:"Seorang siswa menabung setiap minggu dengan pola: Rp4.000, Rp7.000, Rp10.000, Rp13.000, ... Berapa total tabungan selama 10 minggu?",
options:["Rp85.000","Rp95.000","Rp100.000","Rp175.000"],
correct:"Rp175.000",
p:"Tabungan mingguan membentuk pola aritmetika dengan suku pertama a = 4.000 dan beda d = 3.000. Suku ke-10 adalah U10 = 4.000 + 9×3.000 = 31.000. Jumlah 10 minggu adalah Sn = n/2 × (a + Un) = 10/2 × (4.000 + 31.000) = 5 × 35.000 = 175.000.",
img:""
},
{
q:"Sebuah gedung memiliki jendela yang disusun bertingkat: Lantai 1: 6 jendela, Lantai 2: 10 jendela, Lantai 3: 14 jendela, dan seterusnya. Berapa jumlah jendela di lantai ke-12?",
options:["46","50","54","58"],
correct:"50",
p:"Jumlah jendela per lantai membentuk pola aritmetika dengan a = 6 dan d = 4. Rumus suku ke-n adalah Un = a + (n - 1)d. Lantai ke-12: U12 = 6 + 11×4 = 6 + 44 = 50. Jadi, jawaban yang benar adalah 50.",
img:""
},
{
q:"Dalam sebuah acara, kursi disusun dalam barisan: Baris 1: 8 kursi, Baris 2: 12 kursi, Baris 3: 16 kursi, dan seterusnya. Jika ada 15 baris, berapa total kursi seluruh baris?",
options:["360","400","420","540"],
correct:"540",
p:"Jumlah kursi per baris membentuk pola aritmetika dengan a = 8 dan d = 4. Suku ke-15 adalah U15 = 8 + 14×4 = 64. Jumlah seluruh kursi adalah Sn = 15/2 × (8 + 64) = 7,5 × 72 = 540.",
img:""
},
{
q:"Seorang petani menanam tanaman dalam barisan: Baris 1: 2 tanaman, Baris 2: 5 tanaman, Baris 3: 8 tanaman, dan seterusnya. Berapa banyak tanaman pada baris ke-20?",
options:["56","59","60","62"],
correct:"59",
p:"Banyak tanaman membentuk pola aritmetika dengan suku pertama a = 2 dan beda d = 3. Rumus suku ke-n adalah Un = a + (n - 1)d. Baris ke-20: U20 = 2 + 19×3 = 59.",
img:""
}

];

let currentQuestion=0;
let answered=new Array(questions.length).fill(false);
let benar=0;
let quizSelesai=false;

/* TIMER */
let t=3600;
let timerInterval=setInterval(()=>{
  if(quizSelesai)return;
  let m=Math.floor(t/60),s=t%60;
  if(s<10)s="0"+s;
  timer.textContent=`Waktu: ${m}:${s}`;
  t--;
},1000);

/* TAMPIL SOAL (✅ SAMA DENGAN CONTOH REGU) */
function showQuestion(){
  let q=questions[currentQuestion];
  questionNumber.textContent=`Soal ${currentQuestion+1}`;
  question.textContent=q.q;

  if(q.img){
    questionImg.src=q.img;
    questionImg.style.display="block";
  }else questionImg.style.display="none";

  options.innerHTML=q.options.map((o,i)=>`
    <button class="optionBtn btn${String.fromCharCode(65+i)}"
      onclick="checkAnswer('${o}',this)"
      ${answered[currentQuestion]||quizSelesai?"disabled":""}>
      ${String.fromCharCode(65+i)}. ${o}
    </button>`).join("");

  /* ✅ INI KUNCINYA */
  feedback.textContent = answered[currentQuestion] ? "✔ Sudah terjawab" : "";
}

/* JAWAB */
function checkAnswer(ans,btn){
  if(answered[currentQuestion]||quizSelesai)return;
  answered[currentQuestion]=true;

  if(ans===questions[currentQuestion].correct){
    btn.classList.add("correct");
    benar++;
    feedback.textContent="✅ Benar";
  }else{
    btn.classList.add("wrong");
    feedback.textContent="❌ Salah";
  }

  if(answered.every(v=>v)){
    quizSelesai=true;
    clearInterval(timerInterval);
    let nilai=Math.round((benar/questions.length)*100);
    timer.textContent=`✅ Selesai | Nilai: ${nilai}`;
  }
}

/* NAV */
function nextQuestion(){currentQuestion=(currentQuestion+1)%questions.length;showQuestion();}
function prevQuestion(){currentQuestion=(currentQuestion-1+questions.length)%questions.length;showQuestion();}

/* PEMBAHASAN */
function showFocus(){
  let q=questions[currentQuestion];
  quiz.style.display="none";
  focusLayer.style.display="block";
  focusQuestion.textContent=q.q;

  if(q.img){
    focusImg.src=q.img;
    focusImg.style.display="block";
  }else focusImg.style.display="none";

  focusOptions.innerHTML=q.options.map((o,i)=>`
    <div class="focusOption btn${String.fromCharCode(65+i)}"
      style="background:${o===q.correct?'#2ecc71':'#bbb'}">
      ${String.fromCharCode(65+i)}. ${o}
    </div>`).join("");

  focusPembahasan.textContent=q.p;
}
function closeFocus(){
  focusLayer.style.display="none";
  quiz.style.display="block";
}

/* INIT */
showQuestion();
</script>

</body>
</html>
